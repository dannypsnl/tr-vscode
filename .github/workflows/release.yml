name: Release VSIX

# Build the extension and attach the packaged .vsix to a GitHub Release.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Package extension
        run: npx --yes @vscode/vsce package -o "tr-notes-${{ github.event.release.tag_name }}.vsix"

      - name: Upload VSIX to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" tr-notes-*.vsix --clobber
