name: Release VSIX

# Build the extension and attach the packaged .vsix to a GitHub Release.
# Triggered by pushing a version tag (e.g. `git push origin v0.1.0`).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Package extension
        run: npx --yes @vscode/vsce package -o "tr-notes-${{ github.ref_name }}.vsix"

      - name: Create release and upload VSIX
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" tr-notes-*.vsix --title "${{ github.ref_name }}" --generate-notes
